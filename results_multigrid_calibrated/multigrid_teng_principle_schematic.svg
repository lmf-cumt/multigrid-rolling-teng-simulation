<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#263238"/>
    </marker>
    <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#1e64c8"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #17212b; }
      .subtitle { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 18px; fill: #44515c; }
      .label { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 18px; fill: #24313c; }
      .small { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 15px; fill: #44515c; }
      .tiny { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 13px; fill: #55616d; }
      .panel { fill: #ffffff; stroke: #d4dae0; stroke-width: 1.5; rx: 8; }
      .base { fill: #e9edf2; stroke: #b8c0c9; stroke-width: 1.5; }
      .elecA { fill: #2f6f9f; stroke: #174965; stroke-width: 1.2; }
      .elecB { fill: #e0a629; stroke: #9a6a00; stroke-width: 1.2; }
      .gap { fill: #f5f7fa; stroke: #c3cad2; stroke-width: 1; }
      .ball { fill: #f8fafc; stroke: #5f6b75; stroke-width: 1.8; }
      .charge { fill: #c5221f; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .wire { fill: none; stroke: #263238; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .field { fill: none; stroke: #1e64c8; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#blueArrow); }
      .dash { fill: none; stroke: #7b8792; stroke-width: 1.5; stroke-dasharray: 6 6; }
      .green { fill: #1e8e3e; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="#f7f9fb"/>
  <text x="700" y="52" text-anchor="middle" class="title">多栅格交替电极滚球式 TENG 工作原理与仿真输出示意图</text>
  <text x="700" y="84" text-anchor="middle" class="subtitle">固定 PTFE 球电荷密度；由双电极 380 nC 与四电极 650 nC 校准结构利用系数</text>

  <rect x="48" y="120" width="820" height="430" class="panel"/>
  <text x="78" y="155" class="label">1. 多栅格交替电极结构</text>
  <text x="78" y="182" class="small">奇数栅格并联为 A 端，偶数栅格并联为 B 端；滚球跨越 A/B 边界时产生感应电荷转移。</text>

  <rect x="100" y="412" width="700" height="48" class="base"/>
  <text x="118" y="444" class="small">PCB 基底，厚度 1 mm</text>

  <rect x="130" y="330" width="92" height="82" class="elecA"/>
  <rect x="222" y="330" width="30" height="82" class="gap"/>
  <rect x="252" y="330" width="92" height="82" class="elecB"/>
  <rect x="344" y="330" width="30" height="82" class="gap"/>
  <rect x="374" y="330" width="92" height="82" class="elecA"/>
  <rect x="466" y="330" width="30" height="82" class="gap"/>
  <rect x="496" y="330" width="92" height="82" class="elecB"/>
  <rect x="588" y="330" width="30" height="82" class="gap"/>
  <rect x="618" y="330" width="92" height="82" class="elecA"/>
  <rect x="710" y="330" width="30" height="82" class="gap"/>
  <rect x="740" y="330" width="42" height="82" class="elecB"/>

  <text x="176" y="382" text-anchor="middle" class="label" fill="#ffffff">A</text>
  <text x="298" y="382" text-anchor="middle" class="label">B</text>
  <text x="420" y="382" text-anchor="middle" class="label" fill="#ffffff">A</text>
  <text x="542" y="382" text-anchor="middle" class="label">B</text>
  <text x="664" y="382" text-anchor="middle" class="label" fill="#ffffff">A</text>
  <text x="762" y="382" text-anchor="middle" class="label">B</text>

  <text x="176" y="307" text-anchor="middle" class="tiny">16 mm</text>
  <text x="237" y="307" text-anchor="middle" class="tiny">5 mm</text>
  <line x1="130" y1="315" x2="222" y2="315" class="dash"/>
  <line x1="222" y1="315" x2="252" y2="315" class="dash"/>

  <circle cx="284" cy="282" r="27" class="ball"/>
  <circle cx="346" cy="282" r="27" class="ball"/>
  <circle cx="408" cy="282" r="27" class="ball"/>
  <circle cx="470" cy="282" r="27" class="ball"/>
  <text x="284" y="288" text-anchor="middle" class="charge">−</text>
  <text x="346" y="288" text-anchor="middle" class="charge">−</text>
  <text x="408" y="288" text-anchor="middle" class="charge">−</text>
  <text x="470" y="288" text-anchor="middle" class="charge">−</text>
  <text x="377" y="242" text-anchor="middle" class="small">PTFE 滚球组，4 个直径 4 mm 球</text>

  <path d="M185 250 C280 205, 520 205, 715 250" class="wire" marker-end="url(#arrow)"/>
  <text x="450" y="215" text-anchor="middle" class="label">往复滚动，行程 100 mm</text>
  <text x="450" y="530" text-anchor="middle" class="small">运动输入：加/减速度 5 m/s²；起点/终点停留 30 ms</text>

  <path d="M346 310 C338 335, 320 352, 298 365" class="field"/>
  <path d="M408 310 C420 336, 448 354, 542 365" class="field"/>
  <path d="M470 310 C508 338, 610 356, 664 365" class="field"/>

  <line x1="176" y1="412" x2="176" y2="500" class="wire"/>
  <line x1="420" y1="412" x2="420" y2="500" class="wire"/>
  <line x1="664" y1="412" x2="664" y2="500" class="wire"/>
  <line x1="176" y1="500" x2="664" y2="500" class="wire"/>
  <text x="675" y="505" class="small">A 端</text>
  <line x1="298" y1="412" x2="298" y2="476" class="wire"/>
  <line x1="542" y1="412" x2="542" y2="476" class="wire"/>
  <line x1="762" y1="412" x2="762" y2="476" class="wire"/>
  <line x1="298" y1="476" x2="762" y2="476" class="wire"/>
  <text x="773" y="481" class="small">B 端</text>

  <rect x="900" y="120" width="452" height="430" class="panel"/>
  <text x="930" y="155" class="label">2. 等效电路与输出量</text>
  <text x="930" y="182" class="small">静电感应产生等效电荷源，经外接负载输出电流、电压、功率和能量。</text>

  <circle cx="1010" cy="300" r="46" fill="#eef5ff" stroke="#2f6f9f" stroke-width="2"/>
  <text x="1010" y="293" text-anchor="middle" class="label">Q(t)</text>
  <text x="1010" y="316" text-anchor="middle" class="tiny">电荷源</text>
  <line x1="1056" y1="300" x2="1138" y2="300" class="wire" marker-end="url(#arrow)"/>
  <path d="M1138 300 L1138 250 L1185 250 L1185 350 L1138 350 L1138 300" fill="none" stroke="#263238" stroke-width="3"/>
  <text x="1162" y="307" text-anchor="middle" class="label">R</text>
  <text x="1162" y="380" text-anchor="middle" class="small">负载电阻扫描</text>
  <line x1="1185" y1="300" x2="1260" y2="300" class="wire"/>
  <line x1="1260" y1="300" x2="1260" y2="395" class="wire"/>
  <line x1="1260" y1="395" x2="1010" y2="395" class="wire"/>
  <line x1="1010" y1="395" x2="1010" y2="346" class="wire"/>

  <text x="1125" y="235" text-anchor="middle" class="tiny">I(t)</text>
  <text x="1210" y="285" text-anchor="middle" class="tiny">V(t)</text>
  <text x="930" y="438" class="small">计算关系：I = dQ/dt，V = I·R，P = V²/R，E = ∫Pdt</text>
  <text x="930" y="468" class="small">校准条件：16×9 单元并联；双电极 380 nC，四电极 650 nC</text>
  <text x="930" y="498" class="small">COMSOL/等效模型输出：电流、电荷、电压、功率、能量随时间变化</text>

  <rect x="48" y="585" width="1304" height="250" class="panel"/>
  <text x="78" y="622" class="label">3. 关键输出参数对比，完整往复周期，R = 1 GΩ</text>

  <line x1="100" y1="665" x2="1300" y2="665" stroke="#cbd3dc" stroke-width="1.5"/>
  <line x1="100" y1="720" x2="1300" y2="720" stroke="#e3e8ee" stroke-width="1"/>
  <line x1="100" y1="775" x2="1300" y2="775" stroke="#e3e8ee" stroke-width="1"/>
  <text x="130" y="650" class="small">结构</text>
  <text x="310" y="650" class="small">有效转移事件</text>
  <text x="515" y="650" class="small">峰值电流</text>
  <text x="715" y="650" class="small">平均功率</text>
  <text x="915" y="650" class="small">周期能量</text>
  <text x="1115" y="650" class="small">相对能量</text>

  <text x="130" y="700" class="label">双电极</text>
  <text x="330" y="700" class="label">1 次</text>
  <text x="515" y="700" class="label">1.89 μA</text>
  <text x="715" y="700" class="label">1.195 mW</text>
  <text x="915" y="700" class="label">783 μJ</text>
  <text x="1115" y="700" class="label">1.00×</text>

  <text x="130" y="755" class="label">四电极</text>
  <text x="330" y="755" class="label">3 次</text>
  <text x="515" y="755" class="label">2.54 μA</text>
  <text x="715" y="755" class="label">4.301 mW</text>
  <text x="915" y="755" class="label">2820 μJ</text>
  <text x="1115" y="755" class="label green">3.60×</text>

  <text x="130" y="810" class="label">六电极</text>
  <text x="330" y="810" class="label">5 次</text>
  <text x="515" y="810" class="label">5.06 μA</text>
  <text x="715" y="810" class="label">5.486 mW</text>
  <text x="915" y="810" class="label">3597 μJ</text>
  <text x="1115" y="810" class="label green">4.59×</text>

  <text x="78" y="868" class="tiny">注：本图用于说明书中的原理性表达。数值来自固定 PTFE 电荷密度假设下的完整周期仿真；输出差异来源于电极结构改变的电荷利用率。</text>
</svg>
